# 作用：这是你的 Vultr 服务器上用于驱动 Drupal 11 的核心 Web 引擎配置
# 请将其软链接或复制到 /etc/nginx/sites-available/ 并启用
server {
    listen 80;
    listen [::]:80;
    server_name tlte.top www.tlte.to; # 这里改成你的真实域名

    # 如果有 SSL 证书，请启用 443 并配置证书路径
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/tlte.top.pem;
    # ssl_certificate_key /etc/nginx/ssl/tlte.top.key;

    # 动态适应 web 目录结构
    root /var/www/html/drupal11/web; 
    index index.php index.html index.htm;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gzip 压缩配置，加速页面加载
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    location / {
        # 如果文件不存在，统统交给 Drupal 核心路由处理（优雅链接 pathauto 就靠这句）
        try_files $uri /index.php?$query_string;
    }

    # 处理图片样式生成的路径 (Image Styles)
    location ~ ^/sites/[^/]+/files/styles/ {
        try_files $uri /index.php?$query_string;
        access_log off;
        expires 30d;
    }

    # PHP-FPM 8.3 解析核心设置
    location ~ '\.php$|^/update.php' {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        
        # 常见防坑：确认你的 php-fpm sock 路径是不是下面这个
        fastcgi_pass unix:/run/php/php8.3-fpm.sock; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_intercept_errors on;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # 封杀对隐藏文件和备份文件的访问，保命用
    location ~* \.(engine|inc|install|make|module|profile|po|sh|.*sql|theme|twig|tpl(\.php)?|xtmpl|yml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|/(\.(?!well-known).*)|Entries.*|Repository|Root|Tag|Template$|^#.*#$|\.php(~|\.sw[op]|\.bak|\.orig|\.save)$ {
        deny all;
        return 404;
    }

    # 静态资源长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri @rewrite;
        expires max;
        log_not_found off;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }
}
