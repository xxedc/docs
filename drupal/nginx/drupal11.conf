# =============================================================
# drupal11.conf — Nginx 站点配置
# 使用方法：cp drupal11.conf /etc/nginx/sites-available/drupal11.conf
#           ln -sf /etc/nginx/sites-available/drupal11.conf /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx
# =============================================================

# HTTP 强制跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tlte.top www.tlte.top;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tlte.top www.tlte.top;

    # ── SSL 证书 ──
    ssl_certificate     /etc/letsencrypt/live/tlte.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tlte.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── 根目录 ──
    root /var/www/html/drupal11/web;
    index index.php;

    # ── 安全响应头 ──
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip 压缩 ──
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── 日志 ──
    access_log /var/log/nginx/drupal11.access.log combined;
    error_log  /var/log/nginx/drupal11.error.log warn;

    # ── 静态资源缓存（1年）──
    location ~* \.(css|js|woff2|woff|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── HTML/PHP 缓存（5分钟）──
    location ~* \.html?$ {
        expires 5m;
        add_header Cache-Control "public";
    }

    # ── Drupal 主要路由 ──
    location / {
        try_files $uri /index.php?$query_string;
    }

    # ── PHP-FPM ──
    location ~ '\.php$|^/update.php' {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        # 若用 TCP: fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_param  HTTP_PROXY        "";
        fastcgi_read_timeout             300;
        fastcgi_buffer_size              128k;
        fastcgi_buffers                  4 256k;
        fastcgi_busy_buffers_size        256k;

        # API 接口不缓存
        fastcgi_no_cache $request_uri;
    }

    # ── 禁止访问敏感文件 ──
    location ~ \.(engine|inc|install|make|module|profile|po|sh|.*sql|theme|twig|tpl(\.php)?|xtmpl|yml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|/(\.(?!well-known).*|Entries.*|Repository|Root|Tag|Template|composer\.(json|lock)|web\.config)$|/#.*#$|\.php(~|\.sw[op]|\.bak|\.orig|\.save)$ {
        deny all;
        return 404;
    }

    # ── 禁止直接访问 vendor ──
    location ^~ /vendor/ {
        deny all;
        return 404;
    }

    # ── 文件上传大小限制 ──
    client_max_body_size 2100M;

    # ── Drupal 私有文件 ──
    location ~ ^/sites/.*/private/ {
        return 403;
    }

    # ── 图片样式 ──
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }

    # ── 内部重写 ──
    location @rewrite {
        rewrite ^ /index.php;
    }
}
